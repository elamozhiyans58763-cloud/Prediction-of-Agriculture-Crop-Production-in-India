<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Crop Production Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-form-panel">
                <div class="login-brand">
                    <h1>🌾 Welcome Back</h1>
                    <p>Sign in to access the crop production prediction dashboard.</p>
                </div>

                {% if error %}
                <div class="alert">{{ error }}</div>
                {% endif %}

                <form method="post" action="{{ url_for('login') }}" class="login-form">
                    <div class="form-group">
                        <label for="username">👤 Username</label>
                        <input type="text" id="username" name="username" value="{{ username or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label for="password">🔐 Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary login-btn">🚀 Sign in</button>
                </form>

                <div class="login-footer">
                    <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a></p>
                </div>
            </div>

            <div class="login-image-panel">
                <div class="login-image-copy">
                    <h2>🌿 Growing Together</h2>
                    <p>Smart agriculture predictions powered by nature. Train and predict crop production with ease and precision.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
